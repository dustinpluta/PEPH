# Minimal PEPH configuration
# This template runs a standard piecewise exponential PH model
# without spatial frailty.

run_name: peph_example_run

data:
  path: data/example_survival_data.csv
  format: csv

data_schema:
  id_col: id
  time_col: time
  event_col: event

  x_numeric:
    - age
    - comorbidity_index

  x_categorical:
    - sex

  categorical_reference_levels:
    sex: F

time:
  scale: days
  breaks: [0, 365, 730, 1825]
  interval_closed: left
  interval_open: right

split:
  strategy: subject_random
  test_size: 0.25
  seed: 123

fit:
  backend: statsmodels_glm_poisson

predict:
  horizons_days: [365, 730, 1825]
  grid:
    use_breaks: true
    extra_times: []

metrics:
  compute_on: test
  discrimination:
    c_index: true
    time_dependent_auc: true
  calibration:
    calibration_in_the_large: true
    calibration_slope: true
    brier_score: true
  residuals:
    cox_snell: true

plots:
  calibration_risk: true
  cox_snell: true

output:
  root_dir: models