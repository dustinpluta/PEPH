run_name: seer_crc_peph_v1

data:
  path: simulated_seer_crc.csv
  format: csv

schema:
  id_col: id
  time_col: time
  event_col: event

  x_numeric:
    - age_per10_centered
    - cci
    - tumor_size_log
    - ses

  x_categorical:
    - sex
    - stage

  categorical_reference_levels:
    sex: F
    stage: I

time:
  scale: days
  breaks: [0, 30, 90, 180, 365, 730, 1825]
  interval_closed: left   # [a,b)
  interval_open: right

split:
  strategy: subject_random
  test_size: 0.25
  seed: 123

fit:
  backend: statsmodels_glm_poisson
  max_iter: 200
  tol: 1.0e-8

predict:
  horizons_days: [365, 730, 1825]   # 1y, 2y, 5y
  grid:
    use_breaks: true
    extra_times: []                 # can add custom times later

metrics:
  compute_on: test
  discrimination:
    c_index: true
    time_dependent_auc: true
  calibration:
    calibration_in_the_large: true
    calibration_slope: true
    brier_score: true
  residuals:
    cox_snell: true

plots:
  calibration_risk: true
  cox_snell: true

output:
  root_dir: models