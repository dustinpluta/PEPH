data_schema:
  id_col: id
  time_col: time
  event_col: event
  x_numeric:
    - age_per10_centered
    - cci
    - tumor_size_log
    - ses
  x_categorical:
    - sex
    - stage
  x_td_numeric:
    - treated_td
  categorical_reference_levels:
    sex: F
    stage: I

time:
  breaks: [0, 30, 90, 180, 365, 730, 1825]

ttt:
  enabled: true
  treatment_time_col: treatment_time
  treated_td_col: treated_td