sim:
  n: 10000
  seed: 1

time:
  scale: days
  breaks: [0, 30, 90, 180, 365, 730, 1825]

ph:
  beta:
    age_per10_centered: 0.10
    cci: 0.18
    tumor_size_log: 0.25
    ses: -0.08
    sexM: 0.05
    stageII: 0.35
    stageIII: 0.70
    stageIV: 1.20

  # baseline interval hazard ν_k (per day) for K=6 intervals
  nu: [0.0040, 0.0030, 0.0024, 0.0018, 0.0013, 0.0010]

censoring:
  admin_censor_days: 1825
  random_censor:
    enabled: true
    distribution: exponential
    rate: 0.0008

output:
  path: data/dev/simulated_seer_crc.csv