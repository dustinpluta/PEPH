run_name: sim_ph_small

data:
  path: tests/fixtures/PLACEHOLDER.csv
  format: csv

data_schema:
  id_col: id
  time_col: time
  event_col: event
  x_numeric: [age_per10_centered, cci, tumor_size_log, ses]
  x_categorical: [sex, stage]
  categorical_reference_levels:
    sex: F
    stage: I

time:
  breaks: [0, 30, 90, 180, 365, 730, 1825]

split:
  test_size: 0.25
  seed: 123

fit:
  backend: statsmodels_glm_poisson
  covariance: classical

predict:
  horizons_days: [365, 730, 1825]

plots:
  calibration_risk: true
  cox_snell: true

metrics:
  discrimination:
    c_index: true
    time_dependent_auc: true
  calibration:
    brier_score: true
    calibration_in_the_large: true
    calibration_slope: true
  residuals:
    cox_snell: true

output:
  root_dir: data/dev/pytest_sim_ph