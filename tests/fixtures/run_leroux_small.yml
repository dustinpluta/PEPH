run_name: test_smoke_leroux

data:
  path: tests/fixtures/leroux_small.csv
  format: csv

output:
  root_dir: data/dev/test_smoke_leroux

data_schema:
  id_col: id
  time_col: time
  event_col: event
  x_numeric:
    - age_per10_centered
    - cci
    - tumor_size_log
    - ses
  x_categorical:
    - sex
    - stage
  categorical_reference_levels:
    sex: F
    stage: I

time:
  breaks: [0, 30, 90, 180, 365, 730, 1825]

fit:
  backend: map_leroux
  max_iter: 100
  tol: 1e-8
  covariance: classical
  leroux_max_iter: 40
  leroux_ftol: 1e-6
  rho_clip: 1e-6
  q_jitter: 1e-8
  prior_logtau_sd: 10.0
  prior_rho_a: 1.0
  prior_rho_b: 1.0

spatial:
  area_col: zip
  zips_path: tests/fixtures/zips.csv
  edges_path: tests/fixtures/edges.csv
  edges_u_col: zip_u
  edges_v_col: zip_v
  allow_unseen_area: false

split:
  test_size: 0.25
  seed: 0

predict:
  horizons_days: [365, 730, 1825]
  frailty_mode: auto

metrics:
  discrimination:
    c_index: true
    time_dependent_auc: true
  calibration:
    brier_score: true
    calibration_in_the_large: true
    calibration_slope: true
  residuals:
    cox_snell: true

plots:
  cox_snell: false
  calibration_risk: false